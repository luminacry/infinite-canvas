services:
  redis:
    image: redis:7-alpine
    container_name: infinite-canvas-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  app:
    image: infinite-canvas:local
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - redis
    env_file:
      - path: .env
        required: false
    environment:
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  redis-data:
